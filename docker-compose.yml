services:
  api:
    image: ghcr.io/${GITHUB_USER}/${GITHUB_REPO}-api:latest
    restart: always
    env_file: .env
    environment:
      - NODE_ENV=production
    volumes:
      - wa-sessions:/app/wa-sessions
      - uploads:/app/apps/api/uploads
    networks:
      - wac

  dashboard:
    image: ghcr.io/${GITHUB_USER}/${GITHUB_REPO}-dashboard:latest
    restart: always
    env_file: .env
    environment:
      - NODE_ENV=production
    networks:
      - wac

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - dashboard
    networks:
      - wac

volumes:
  wa-sessions:
  uploads:

networks:
  wac:
    driver: bridge
