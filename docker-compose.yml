services:
  api:
    image: ghcr.io/starnetweb/starnetchat-api:latest
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - API_PORT=4000
      - DASHBOARD_URL=${DASHBOARD_URL}
      - WA_SESSION_PATH=/app/wa-sessions
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "4000:4000"
    volumes:
      - wa-sessions:/app/wa-sessions
      - uploads:/app/apps/api/uploads

  dashboard:
    image: ghcr.io/starnetweb/starnetchat-dashboard:latest
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${DASHBOARD_URL}
    ports:
      - "3001:3000"

volumes:
  wa-sessions:
  uploads:
