services:
  api:
    image: ghcr.io/starnetweb/starnetchat-api:latest
    restart: always
    env_file: .env
    environment:
      - NODE_ENV=production
    ports:
      - "4000:4000"
    volumes:
      - wa-sessions:/app/wa-sessions
      - uploads:/app/apps/api/uploads

  dashboard:
    image: ghcr.io/starnetweb/starnetchat-dashboard:latest
    restart: always
    env_file: .env
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"

volumes:
  wa-sessions:
  uploads:
