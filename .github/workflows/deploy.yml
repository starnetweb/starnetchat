name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  GITHUB_USER: ${{ github.repository_owner }}
  GITHUB_REPO: ${{ github.event.repository.name }}

jobs:
  build-and-push:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ghcr.io/starnetweb/starnetchat-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/dashboard/Dockerfile
          push: true
          tags: ghcr.io/starnetweb/starnetchat-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # SSH deploy job removed — deployment handled via Hostinger Docker UI
  # Images are available at:
  #   ghcr.io/starnetweb/starnetchat-api:latest
  #   ghcr.io/starnetweb/starnetchat-dashboard:latest
